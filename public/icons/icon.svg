  <!-- Station dot — center -->
  <circle cx="96" cy="92" r="14" fill="#0A0D14" stroke="#E63946" stroke-width="4"/>
  <circle cx="96" cy="92" r="7" fill="#E63946"/>
  <!-- Pulse ring -->
